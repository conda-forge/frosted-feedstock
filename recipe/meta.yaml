{% set name = "frosted" %}
{% set version = "1.4.1" %}
{% set sha256 = "d1e5d2b43a064b33c289b9a986a7425fd9a36bed8f519ca430ac7a0915e32b51" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  fn: {{ name }}-{{ version }}.tar.gz
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  noarch: python
  number: 2
  script: {{ PYTHON }} -m pip install . --no-deps -vv
  entry_points:
    - frosted = frosted.main:main

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools

  run:
    - python >={{ python_min }}
    - pies >=2.6.0

test:
  imports:
    - frosted
    - frosted.test

  commands:
    - frosted --help

  requires:
    - mock
    - pytest
    - python {{ python_min }}

about:
  home: https://github.com/timothycrosley/frosted
  license: MIT
  summary: 'A passive Python syntax checker'

extra:
  recipe-maintainers:
    - jakirkham
